name: CI-CD Docker Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ci-html
  IMAGE_TAG: 1.0.1
  DOCKER_REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  # JOB 1 - BUILD + PUSH
  ci:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG .

      - name: Push Docker image
        run: docker push $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

  # JOB 2 - SCAN TRIVY (BONUS)
  scan-trivy:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          vuln-type: os,library
          ignore-unfixed: true

  # JOB 3 - DEPLOY
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: scan-trivy
    steps:
      - name: Pull latest image
        run: docker pull $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG

      - name: Stop existing container
        run: docker stop ci-app || true

      - name: Remove old container
        run: docker rm ci-app || true

      - name: Run new container
        run: |
          docker run -d \
            -p 80:80 \
            --name ci-app \
            $DOCKER_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
```

